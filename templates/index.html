<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Playbook Strategy Predictor</title>
</head>
<body>

    <h1>NFL Playbook Predictor</h1>
    
    <form action="/predict" method="POST">
        <p>
            <label for="down">Down:</label>
            <select name="down" id="down">
                <option value="1">1st Down</option>
                <option value="2">2nd Down</option>
                <option value="3">3rd Down</option>
                <option value="4">4th Down</option>
            </select>
        </p>

        <p>
            <label for="distance">Yards to Go (Distance):</label>
            <input type="number" name="distance" id="distance" min="1" max="99" value="10" required>
        </p>

        <button type="submit">Predict Play Call</button>
    </form>

    {% if prediction %}
    <h2>Recommended Play:</h2>
    <p style="font-size: 20px; font-weight: bold;">
        {{ prediction }}
    </p>
    {% endif %}

</body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFL 戦術シミュレーター</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 2rem; }
      .card { max-width: 640px; margin: 0 auto; border: 1px solid #ddd; padding: 1.2rem; border-radius: 8px; }
      label { display:block; margin-top:0.6rem; }
      input[type="number"] { width:100%; padding:0.5rem; box-sizing:border-box; }
      .row { display:flex; gap: 1rem; }
      .col { flex:1 }
      .result { margin-top:1rem; padding:0.8rem; background:#f7f9fc; border-radius:6px }
      .error { color:#b00020 }
      button { margin-top:1rem; padding:0.6rem 1rem }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>NFL 戦術シミュレーター</h2>
      <p>攻撃・守備の4つのスタッツを入力して、推奨されるパス/ランの割合を計算します。</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        <div class="row">
          <div class="col">
            <label>攻撃 - パス攻撃力 (例: 7.5)</label>
            <input type="number" step="any" name="off_pass" required />
          </div>
          <div class="col">
            <label>攻撃 - ラン攻撃力 (例: 4.2)</label>
            <input type="number" step="any" name="off_run" required />
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>守備 - パス許容 (高いほどパスが通りやすい)</label>
            <input type="number" step="any" name="def_pass_allowed" required />
          </div>
          <div class="col">
            <label>守備 - ラン許容 (高いほどランが止めにくい)</label>
            <input type="number" step="any" name="def_run_allowed" required />
          </div>
        </div>

        <button type="submit">計算する</button>
      </form>

      {% if result %}
        <div class="result">
          <strong>推奨攻撃バランス</strong>
          <div>パス: {{ result.pass }}% </div>
          <div>ラン: {{ result.run }}% </div>
        </div>
      {% endif %}
    </div>
  </body>
</html>

{% if result %}
        <div class="result-box">
            <div class="strategy-badge {% if 'Pure' in result.strategy %}badge-pure{% else %}badge-mixed{% endif %}">
                {{ result.strategy }}
            </div>
            <h3>📊 Optimal Strategy Ratios</h3>
            <div style="display: flex; gap: 40px; justify-content: center; margin-bottom: 20px;">
                <div>
                    <h4 style="margin-bottom: 5px;">Pass Call</h4>
                    <span class="stat-value">{{ result.off_pass }}%</span>
                </div>
                <div>
                    <h4 style="margin-bottom: 5px;">Run Call</h4>
                    <span class="stat-value">{{ result.off_run }}%</span>
                </div>
            </div>
            <div class="expected-yards-box">
                <span>🏈 Expected Yards</span>
                <span style="font-size: 2.6rem; font-weight: 700;">{{ result.expected_yards }} yds</span>
            </div>
        </div>
    {% endif %}
